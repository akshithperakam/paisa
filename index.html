<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Paisa Track — Smart Expense Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>
(function () {
  try {
    const saved = localStorage.getItem('paisa-theme');
    const system = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    const theme = saved || system;
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.style.colorScheme = theme;
  } catch (e) {}
})();
</script>

<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #14141f;
    --border: #1c1c2e;
    --border2: #252535;
    --text: #e8e4f0;
    --text2: #7a7a9a;
    --text3: #3a3a5a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affcb;
    --accent4: #ffb86a;
    --gold: #ffd166;
    --red: #ff4757;
    --green: #2ecc71;
    --glow: rgba(124,106,255,0.15);
    --blob1: rgba(124,106,255,0.08);
    --blob2: rgba(255,106,155,0.06);
    --header-bg: rgba(8,8,16,0.92);
    --nav-bg: rgba(8,8,16,0.95);
    --overlay-bg: rgba(0,0,0,0.7);
    --card-shadow: 0 8px 32px rgba(0,0,0,0.35);
    --card-gradient: linear-gradient(135deg, #1a1435 0%, #1a2035 100%);
    --amount-gradient: linear-gradient(135deg, #1a1435, #0f1a35);
    --analytics-gradient: linear-gradient(135deg, #0f1a20, #1a2010);
    --hero-amount-start: #ffffff;
    --hmap-cell-size: clamp(34px, 9.4vw, 46px);
  }

  html { color-scheme: dark; }
  html[data-theme='light'] {
    color-scheme: light;
    --bg: #f4f7fb;
    --surface: #ffffff;
    --surface2: #edf2f8;
    --border: #d6deea;
    --border2: #c6d0e0;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --accent: #6b5cff;
    --accent2: #ec4899;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --gold: #f59e0b;
    --red: #ef4444;
    --green: #16a34a;
    --glow: rgba(107,92,255,0.14);
    --blob1: rgba(107,92,255,0.10);
    --blob2: rgba(236,72,153,0.08);
    --header-bg: rgba(244,247,251,0.9);
    --nav-bg: rgba(244,247,251,0.92);
    --overlay-bg: rgba(15,23,42,0.12);
    --card-shadow: 0 12px 28px rgba(15,23,42,0.10);
    --card-gradient: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
    --amount-gradient: linear-gradient(135deg, #ffffff, #f3f7fc);
    --analytics-gradient: linear-gradient(135deg, #ffffff, #f4f7fb);
    --hero-amount-start: #0f172a;
    --hmap-cell-size: clamp(34px, 9.4vw, 46px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  button, a, input, select, textarea, [role="button"], .tx-row, .cat-option, .filter-chip, .hmap-cell, .ym-dot, .schart-bar-wrap, .nav-btn, .submit-btn, .modal-save-btn, .type-btn {
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior-x: none;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--blob1) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    animation: drift 20s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, var(--blob2) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }

  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s, visibility 0.5s;
  }
  #loading.hidden { opacity:0; visibility:hidden; pointer-events:none; }
  .loader-logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 24px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .loader-bar {
    width: 200px; height: 2px;
    background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .loader-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    animation: load 1.5s ease-in-out infinite;
  }
  @keyframes load { 0%{width:0;margin-left:0} 50%{width:100%;margin-left:0} 100%{width:0;margin-left:100%} }

  #app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding-bottom:100px; min-height:100vh; width:100%; overflow-x:hidden; min-width:0; }

  .app-header {
    padding: 20px 20px 0;
    position: sticky; top: 0;
    background: var(--header-bg);
    backdrop-filter: blur(20px);
    z-index: 100;
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s;
  }
  .app-header.scrolled { border-color: var(--border); }

  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .header-actions {
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .theme-toggle {
    width: 36px; height: 36px;
    border-radius: 12px;
    border: 1px solid var(--border2);
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    color: var(--text);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    flex-shrink: 0;
  }
  .theme-toggle:active { transform: scale(0.92); }
  .theme-toggle-icon {
    font-size: 16px;
    line-height: 1;
  }
  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800; letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sync-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; color: var(--text3);
    letter-spacing: 1px;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .sync-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s infinite; }
  .sync-dot.syncing { background: var(--gold); animation: blink 0.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .tab-bar {
    display: flex; margin-top: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; background: none; border: none;
    color: var(--text3); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1.5px;
    padding: 10px 4px 12px;
    cursor: pointer; position: relative;
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::after {
    content: '';
    position: absolute; bottom: -1px; left: 20%; right: 20%;
    height: 2px; background: var(--accent);
    border-radius: 2px 2px 0 0;
    box-shadow: 0 0 12px var(--accent);
  }

  .page { display:none; padding: 20px 16px; animation: fadeUp 0.3s ease; }
  .page > * { min-width: 0; }
  .page.active { display:block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* DASHBOARD */
  .hero-card {
    background: var(--card-gradient);
    border: 1px solid rgba(124,106,255,0.18);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 16px;
    position: relative; overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(124,106,255,0.2), transparent 70%);
    border-radius: 50%;
  }
  .hero-label {
    font-size: 10px; letter-spacing: 2px; color: var(--text2);
    margin-bottom: 8px; text-transform: uppercase;
  }
  .hero-amount {
    font-family: 'Syne', sans-serif;
    font-size: 42px; font-weight: 800;
    line-height: 1; margin-bottom: 16px;
    background: linear-gradient(135deg, var(--hero-amount-start) 60%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-meta { display: flex; gap: 20px; }
  .hero-meta-item { display:flex; flex-direction:column; gap:2px; }
  .hero-meta-label { font-size: 9px; color: var(--text3); letter-spacing: 1px; }
  .hero-meta-value { font-size: 13px; color: var(--text); }

  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 16px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:active { transform: scale(0.97); }
  .stat-icon { font-size: 20px; margin-bottom: 8px; }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 700;
    margin-bottom: 2px;
  }
  .stat-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 10px; letter-spacing: 2px; color: var(--text2);
    text-transform: uppercase;
  }
  .section-action {
    font-size: 10px; color: var(--accent); cursor: pointer; letter-spacing: 1px;
    background: none; border: none; font-family: 'JetBrains Mono', monospace;
  }

  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px; margin-bottom: 16px;
  }
  .cat-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
  }
  .cat-row:last-child { margin-bottom: 0; }
  .cat-icon-wrap {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .cat-info { flex: 1; min-width: 0; }
  .cat-name { font-size: 11px; margin-bottom: 5px; color: var(--text); }
  .cat-bar-wrap { height: 3px; background: var(--border); border-radius: 3px; }
  .cat-bar { height: 3px; border-radius: 3px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .cat-amount { font-size: 12px; font-weight: 500; flex-shrink: 0; }

  .tx-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    margin-bottom: 16px;
  }
  .tx-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }
  .tx-row:last-child { border-bottom: none; }
  .tx-row:active { background: var(--surface2); }
  .tx-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-note {
    font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .tx-meta { font-size: 10px; color: var(--text2); letter-spacing: 0.5px; }
  .tx-amount { font-size: 14px; font-weight: 600; flex-shrink: 0; }

  .empty {
    text-align: center; padding: 48px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 14px; margin-bottom: 6px; color: var(--text2); }
  .empty-sub { font-size: 11px; line-height: 1.6; }

  /* ADD EXPENSE */
  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 24px;
    margin-bottom: 16px;
  }

  .amount-display {
    text-align: center; padding: 28px 20px;
    background: var(--amount-gradient);
    border-radius: 16px; margin-bottom: 24px;
    border: 1px solid rgba(124,106,255,0.15);
    position: relative; cursor: text;
  }
  .amount-prefix { font-size: 28px; color: var(--text2); vertical-align: super; }
  .amount-input-display {
    font-family: 'Syne', sans-serif;
    font-size: 52px; font-weight: 800;
    color: var(--text); min-width: 100px; display: inline-block;
    letter-spacing: -2px; line-height: 1;
  }
  .amount-cursor {
    display: inline-block; width: 3px; height: 52px;
    background: var(--accent); margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s infinite;
  }
  .amount-hint { font-size: 10px; color: var(--text3); margin-top: 6px; letter-spacing: 1px; }
  .real-amount-input {
    position: absolute; opacity: 0; width: 1px; height: 1px; top:0; left:0;
  }

  .form-group { margin-bottom: 18px; }
  .form-label {
    font-size: 10px; letter-spacing: 2px; color: var(--text2);
    text-transform: uppercase; display: block; margin-bottom: 8px;
  }
  .form-input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border2); border-radius: 12px;
    padding: 14px 16px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.1);
  }
  .form-input::placeholder { color: var(--text3); }

  .cat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cat-option {
    background: var(--bg); border: 1px solid var(--border2);
    border-radius: 12px; padding: 12px 6px;
    cursor: pointer; text-align: center;
    transition: all 0.15s; display: flex;
    flex-direction: column; align-items: center; gap: 4px;
  }
  .cat-option:active { transform: scale(0.93); }
  .cat-option.selected {
    border-color: currentColor;
    background: rgba(255,255,255,0.05);
  }
  .cat-option-icon { font-size: 20px; }
  .cat-option-label { font-size: 8px; color: var(--text2); letter-spacing: 0.5px; line-height: 1.2; }

  .submit-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--accent), #5a48e0);
    border: none; border-radius: 14px;
    color: #fff; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-btn.success { background: linear-gradient(135deg, #2ecc71, #1abc9c); }
  .submit-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
    pointer-events: none;
  }

  /* HISTORY */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
    padding-bottom: 4px; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 20px;
    padding: 7px 14px; font-size: 11px; color: var(--text2);
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s; white-space: nowrap;
  }
  .filter-chip.active {
    background: rgba(124,106,255,0.15);
    border-color: var(--accent); color: var(--accent);
  }

  .month-group-label {
    font-size: 10px; letter-spacing: 2px; color: var(--text3);
    text-transform: uppercase; padding: 8px 4px; margin-top: 8px;
  }

  .history-total-bar {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .history-total-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; }
  .history-total-value { font-size: 16px; color: var(--accent); font-weight: 600; }

  .tx-delete {
    background: none; border: none;
    color: var(--text3); font-size: 18px; cursor: pointer;
    padding: 4px 8px; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .tx-delete:active { color: var(--red); background: rgba(255,71,87,0.1); }

  /* ── HEATMAP ── */
  .heatmap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px 16px 16px;
    margin-bottom: 14px;
    overflow: hidden;
    min-width: 0;
  }
  .heatmap-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .hmap-nav-btn {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text2);
    font-size: 16px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .hmap-nav-btn:active { background: var(--border2); transform: scale(0.9); }
  .hmap-title-wrap { text-align: center; flex: 1; min-width: 0; }
  .hmap-month-label {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--text);
    letter-spacing: 1px;
  }
  .hmap-year-label { font-size: 10px; color: var(--text3); letter-spacing: 2px; margin-top: 1px; }

  /* Year mini-months strip */
  .year-months-strip {
    display: flex; gap: 3px; overflow-x: auto;
    margin-bottom: 12px; padding-bottom: 4px;
    scrollbar-width: none;
    max-width: 100%;
  }
  .year-months-strip::-webkit-scrollbar { display: none; }
  .ym-dot {
    flex-shrink: 0;
    width: 32px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    cursor: pointer; padding: 5px 0 4px;
    border-radius: 8px;
    transition: background 0.15s, transform 0.15s;
    box-sizing: border-box;
  }
  .ym-dot:active { background: var(--border2); transform: translateY(0.5px); }
  .ym-dot.selected { background: rgba(124,106,255,0.15); }
  .ym-dot-bar {
    width: 20px; height: 18px; border-radius: 3px;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .ym-dot-fill {
    width: 100%; height: 14px;
    border-radius: 2px 2px 0 0;
    background: linear-gradient(180deg, var(--accent), rgba(124,106,255,0.3));
    transition: background 0.2s, opacity 0.2s;
  }
  .ym-dot-fill.current { background: linear-gradient(180deg, var(--accent2), rgba(255,106,155,0.3)); }
  .ym-dot-fill.selected-fill { background: linear-gradient(180deg, var(--accent), #7c6aff); }
  .ym-dot-label { font-size: 7px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; line-height: 1; }
  .ym-dot.selected .ym-dot-label { color: var(--accent); }

  /* Calendar grid */
  .hmap-dow-row {
    display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 4px;
    margin-bottom: 6px;
    width: 100%;
  }
  .hmap-dow-row span {
    text-align: center; font-size: 9px; color: var(--text3); letter-spacing: 1px;
    padding: 2px 0;
  }
  .hmap-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 4px;
    width: 100%;
    min-width: 0;
    align-items: start;
    grid-auto-rows: var(--hmap-cell-size);
  }
  .hmap-cell {
    height: var(--hmap-cell-size);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--text3);
    cu
